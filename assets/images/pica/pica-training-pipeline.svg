<text x="55" y="62" class="title">PiCA 的两阶段训练流水线</text><rect x="55" y="100" width="610" height="690" rx="28" class="panel"/><rect x="735" y="100" width="610" height="690" rx="28" class="panel"/><text x="90" y="150" class="subtitle">阶段 A：训练奖励模型</text><text x="770" y="150" class="subtitle">阶段 B：PPO 训练搜索策略</text><rect x="115" y="190" width="490" height="82" rx="18" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/><text x="360.0" y="225" text-anchor="middle" class="body">约 12K 多跳问题</text><text x="360.0" y="252" text-anchor="middle" class="small">Golden sub-query / sub-answer</text><rect x="115" y="315" width="490" height="82" rx="18" fill="#f0fdfa" stroke="#99f6e4" stroke-width="2"/><text x="360.0" y="350" text-anchor="middle" class="body">DeepSeek-V3 × 真实检索</text><text x="360.0" y="377" text-anchor="middle" class="small">每题采样 5 条轨迹 ≈ 60K</text><rect x="115" y="440" width="490" height="82" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/><text x="360.0" y="475" text-anchor="middle" class="body">LLM-as-a-judge</text><text x="360.0" y="502" text-anchor="middle" class="small">逐轮标注 + / −，人工随机审核</text><rect x="115" y="565" width="490" height="82" rx="18" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2"/><text x="360.0" y="600" text-anchor="middle" class="body">Qwen2.5-3B + score head</text><text x="360.0" y="627" text-anchor="middle" class="small">全参数训练过程奖励模型</text><rect x="115" y="690" width="490" height="62" rx="18" fill="#dcfce7" stroke="#86efac" stroke-width="2"/><text x="360.0" y="725" text-anchor="middle" class="body">冻结 PiCA RM</text><text x="360.0" y="752" text-anchor="middle" class="small">提供 turn-level reward</text><line x1="360" y1="272" x2="360" y2="307" class="arrow"/><line x1="360" y1="397" x2="360" y2="432" class="arrow"/><line x1="360" y1="522" x2="360" y2="557" class="arrow"/><line x1="360" y1="647" x2="360" y2="682" class="arrow"/><rect x="795" y="190" width="490" height="82" rx="18" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/><text x="1040.0" y="225" text-anchor="middle" class="body">Actor rollout</text><text x="1040.0" y="252" text-anchor="middle" class="small">think → search → information → answer</text><rect x="795" y="315" width="230" height="92" rx="18" fill="#f0fdfa" stroke="#99f6e4" stroke-width="2"/><text x="910.0" y="350" text-anchor="middle" class="body">Retriever</text><text x="910.0" y="377" text-anchor="middle" class="small">Top-3 Wikipedia</text><rect x="1055" y="315" width="230" height="92" rx="18" fill="#dcfce7" stroke="#86efac" stroke-width="2"/><text x="1170.0" y="350" text-anchor="middle" class="body">Frozen PiCA RM</text><text x="1170.0" y="377" text-anchor="middle" class="small">步骤奖励</text><rect x="795" y="455" width="490" height="92" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/><text x="1040.0" y="490" text-anchor="middle" class="body">总奖励</text><text x="1040.0" y="517" text-anchor="middle" class="small">PiCA + 搜索惩罚 + F1 / 格式</text><rect x="795" y="595" width="230" height="92" rx="18" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2"/><text x="910.0" y="630" text-anchor="middle" class="body">Critic + GAE</text><text x="910.0" y="657" text-anchor="middle" class="small">turn advantage</text><rect x="1055" y="595" width="230" height="92" rx="18" fill="#fee2e2" stroke="#fecaca" stroke-width="2"/><text x="1170.0" y="630" text-anchor="middle" class="body">PPO Update</text><text x="1170.0" y="657" text-anchor="middle" class="small">更新 Actor / Critic</text><line x1="1040" y1="272" x2="1040" y2="305" class="arrow"/><line x1="910" y1="407" x2="910" y2="447" class="arrow"/><line x1="1170" y1="407" x2="1170" y2="447" class="arrow"/><line x1="1040" y1="547" x2="1040" y2="587" class="arrow"/><line x1="1025" y1="641" x2="1047" y2="641" class="arrow"/><path d="M1170 687 C1170 750, 760 760, 760 235 C760 205, 785 205, 795 220" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow)"/><text x="875" y="760" class="small">更新后的 Actor 继续下一批在线 Rollout</te