<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">PiCA 成功概率曲线、pivot 与过程奖励</title>
<desc id="desc">PiCA 成功概率曲线、pivot 与过程奖励</desc>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
  </marker>
  <style>
    .bg { fill:#f8fafc; }
    .panel { fill:white; stroke:#dbe4ee; stroke-width:2; filter:url(#shadow); }
    .title { font:700 32px system-ui,-apple-system,"Noto Sans SC","Microsoft YaHei",sans-serif; fill:#0f172a; }
    .subtitle { font:600 22px system-ui,-apple-system,"Noto Sans SC","Microsoft YaHei",sans-serif; fill:#334155; }
    .body { font:500 18px system-ui,-apple-system,"Noto Sans SC","Microsoft YaHei",sans-serif; fill:#334155; }
    .small { font:500 15px system-ui,-apple-system,"Noto Sans SC","Microsoft YaHei",sans-serif; fill:#475569; }
    .mono { font:600 17px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; fill:#0f172a; }
    .muted { fill:#64748b; }
    .arrow { stroke:#64748b; stroke-width:3; fill:none; marker-end:url(#arrow); }
  </style>
</defs>
<rect class="bg" width="100%" height="100%"/>
<text x="55" y="62" class="title">成功概率变化决定步骤信用</text><rect x="60" y="105" width="1080" height="535" rx="26" class="panel"/><line x1="150" y1="180" x2="150" y2="570" stroke="#94a3b8" stroke-width="3"/><line x1="150" y1="570" x2="1020" y2="570" stroke="#94a3b8" stroke-width="3"/><line x1="142" y1="570.0" x2="1020" y2="570.0" stroke="#e2e8f0" stroke-width="1"/><text x="130" y="576.0" text-anchor="end" class="small">0.0</text><line x1="142" y1="450.0" x2="1020" y2="450.0" stroke="#e2e8f0" stroke-width="1"/><text x="130" y="456.0" text-anchor="end" class="small">0.2</text><line x1="142" y1="330.0" x2="1020" y2="330.0" stroke="#e2e8f0" stroke-width="1"/><text x="130" y="336.0" text-anchor="end" class="small">0.4</text><line x1="142" y1="210.0" x2="1020" y2="210.0" stroke="#e2e8f0" stroke-width="1"/><text x="130" y="216.0" text-anchor="end" class="small">0.6</text><polyline points="180,420.0 420,300.0 660,354.0 900,192.0" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linejoin="round"/><circle cx="180" cy="420.0" r="13" fill="#64748b" stroke="white" stroke-width="5"/><text x="180" y="390.0" text-anchor="middle" class="mono">f0=0.25</text><text x="180" y="615" text-anchor="middle" class="body">初始</text><circle cx="420" cy="300.0" r="13" fill="#22c55e" stroke="white" stroke-width="5"/><text x="420" y="270.0" text-anchor="middle" class="mono">f1=0.45</text><text x="420" y="615" text-anchor="middle" class="body">找到母校</text><circle cx="660" cy="354.0" r="13" fill="#ef4444" stroke="white" stroke-width="5"/><text x="660" y="324.0" text-anchor="middle" class="mono">f2=0.36</text><text x="660" y="615" text-anchor="middle" class="body">误查成立年份</text><circle cx="900" cy="192.0" r="13" fill="#22c55e" stroke="white" stroke-width="5"/><text x="900" y="162.0" text-anchor="middle" class="mono">f3=0.63</text><text x="900" y="615" text-anchor="middle" class="body">找到 1873</text><rect x="242.0" y="307.0" width="116" height="44" rx="22" fill="white" stroke="#15803d" stroke-width="2"/><text x="300.0" y="337.0" text-anchor="middle" style="font:700 18px system-ui;fill:#15803d">r=+0.588</text><rect x="482.0" y="274.0" width="116" height="44" rx="22" fill="white" stroke="#b91c1c" stroke-width="2"/><text x="540.0" y="304.0" text-anchor="middle" style="font:700 18px system-ui;fill:#b91c1c">r=−0.223</text><rect x="722.0" y="220.0" width="116" height="44" rx="22" fill="white" stroke="#15803d" stroke-width="2"/><text x="780.0" y="250.0" text-anchor="middle" style="font:700 18px system-ui;fill:#15803d">r=+0.560</text><rect x="375" y="324.0" width="90" height="36" rx="18" fill="#dcfce7"/><text x="420" y="349.0" text-anchor="middle" style="font:700 15px system-ui;fill:#15803d">PIVOT</text><rect x="855" y="216.0" width="90" height="36" rx="18" fill="#dcfce7"/><text x="900" y="241.0" text-anchor="middle" style="font:700 15px system-ui;fill:#15803d">PIVOT</text><text x="160" y="160" class="small">纵轴：截至当前历史的最终成功概率 f(t)</text><text x="670" y="160" class="mono">rₜ = log[f(t) / f(t-1)]</text></svg>